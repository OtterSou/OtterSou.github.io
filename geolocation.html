<!DOCTYPE html>
<html lang="ja">

<head>
    <title>Geolocation / Speedometer</title>
</head>

<body>
    <h1>Geolocation / Speedometer</h1>
    <div><button id="start-stop-btn" onclick="GPS.toggleActive();">Start</button></div>
    <p>
        <span id="latlon" style="white-space: pre-line;">Press Start</span><br>
        <b>Speed:</b> <span id="speed">-</span> <select id="speed-sel" onchange="GPS.updateDisplay();"></select><br>
        <b>Altitude:</b> <span id="alt">-</span> <select id="alt-sel" onchange="GPS.updateDisplay();"></select>
        <select id="ref-sel" onchange="GPS.updateDisplay();">
            <option value="none">---</option>
            <option value="geoid">Geoid</option>
            <option value="ellipsoid">Ellipsoid</option>
        </select><span id="alt2"></span><br>
        <input type="checkbox" id="address-cb" onchange="GPS.updateDisplay();">
        <label for="address-cb"><b>Address</b></label><b>:</b>
        <span id="address"></span>
    </p>
    <p>
        Geoid height from EGM2008 by <a href="https://earth-info.nga.mil/">US National Geospatial-Intelligence Agency</a>
        (<a href="https://github.com/OtterSou/tile">converted to XYZ tiles</a>)<br>
        Address data from <a href="https://maps.gsi.go.jp/">GSI Maps</a> address tiles by
        <a href="https://www.gsi.go.jp/">Geospatial Information Authority of Japan</a>
    </p>
    <script src="./js/geolocation.js"></script>
</body>

</html>
